baseURL = 'https://outdoorgearnotes.com/'
locale = 'en-US'
title = 'Outdoor Gear Notes'
theme = 'hugo-theme-stack'
enableRobotsTXT = true
disableKinds = ['taxonomy', 'term']

[params]
env = 'production'
description = 'Practical outdoor gear buying guides, camping equipment comparisons, tent selection advice, and Amazon marketplace-informed product notes.'
keywords = ['outdoor gear', 'camping gear', 'tent reviews', 'hiking equipment', 'camping buying guides']
author = 'Outdoor Gear Notes'
defaultTheme = 'auto'
mainSections = ['camping-hiking', 'outdoor-recreation']
rssFullContent = true

[params.sidebar]
subtitle = 'Camping and hiking gear notes for practical outdoor buyers.'
compact = false

[params.article]
toc = true
readingTime = true

[params.article.list]
showTags = true

[params.comments]
enabled = false

[params.colorScheme]
toggle = true
default = 'auto'

[[menu.main]]
name = 'Home'
url = '/'
weight = 10
identifier = 'home'
  [menu.main.params]
  icon = 'home'

[[menu.main]]
name = 'Camping & Hiking'
url = '/camping-hiking/'
weight = 20
identifier = 'camping-hiking'
  [menu.main.params]
  icon = 'categories'
